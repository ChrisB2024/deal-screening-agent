# Fly.io portfolio deployment
# See .spec/appendices/C_flyio_portfolio_deployment.md

app = "deal-screener"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# ---- API process group ----
[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "python -m background_jobs.worker --concurrency 4"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["api"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[services.http_checks]]
    interval = 10000          # 10s
    grace_period = "10s"
    timeout = 5000            # 5s
    path = "/health/readiness"
    method = "GET"

# ---- Machine sizing ----
# API: shared-cpu-1x, 256 MB, 2 machines
# Worker: shared-cpu-2x, 512 MB, 1 machine

[[vm]]
  processes = ["api"]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[vm]]
  processes = ["worker"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 2

[env]
  APP_ENV = "prod"
  SECRETS_PROVIDER = "env_file"
  PYTHONPATH = "/app/src"
  PYTHONUNBUFFERED = "1"

# Secrets are set via `fly secrets set` — never in this file
# Required secrets:
#   DATABASE_URL
#   OPENAI_API_KEY
#   AUTH_SIGNING_KEY_CURRENT
#   DATABASE_PASSWORD

[mounts]
  source = "tmp_sandbox"
  destination = "/tmp/sandbox"
  processes = ["worker"]
